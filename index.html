<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Novia - 1 Año</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="main-container">
        <div class="love-card">
            <h1 class="card-title">Mi hermosa Gaby</h1>
            
            <div class="heart-tree-container">
                <img src="heart_tree_frame.png" alt="Árbol de Corazones Amarillos" class="heart-tree-image">
                <span class="animated-heart"></span>
            </div>
            
            <p class="timer-label">Mi amor por ti comenzó hace...</p>
            <div class="divider"></div>
            
            <div class="countdown-display">
                <span id="years">--</span> años 
                <span id="days">--</span> días 
                <span id="hours">--</span> horas 
                <span id="minutes">--</span> minutos 
                <span id="seconds">--</span> segundos
            </div>
        </div>

        <div class="video-container">
    <video class="main-video" controls playsinline poster="besito.png" style="width: 100%; border-radius: 20px;">
        <source src="video.mp4" type="video/mp4">
        Tu navegador no soporta el formato de video.
    </video>
</div>
        </div>
    </div>

    <script>
     
        const startDate = new Date(2025, 3, 18, 0, 0, 0) 

        function updateCountdown() {
            const now = new Date();
            const timeDifference = now - startDate;

            if (timeDifference < 0) {
              
                document.getElementById('days').textContent = "0";
                return;
            }

            const days = Math.floor(timeDifference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeDifference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((timeDifference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeDifference % (1000 * 60)) / 1000);

       
            const years = Math.floor(days / 365);
            const remainingDays = days % 365;

            document.getElementById('years').textContent = years;
            document.getElementById('days').textContent = remainingDays;
            document.getElementById('hours').textContent = hours;
            document.getElementById('minutes').textContent = minutes;
            document.getElementById('seconds').textContent = seconds;
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
